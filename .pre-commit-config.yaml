repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
        args: [--unsafe]
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        name: ruff check
        args: [.]
        pass_filenames: false

  - repo: local
    hooks:
      - id: docs-refs
        name: docs refs check
        entry: bash scripts/check_docs_refs.sh
        language: system
        pass_filenames: false

      - id: schema-sync-check
        name: docs schema sync check
        entry: env PYTHONPATH=. venv/bin/python scripts/sync_objects_schema_docs.py --check
        language: system
        pass_filenames: false

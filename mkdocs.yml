site_name: StackSats Docs
site_description: Python library docs for quantitative Bitcoin DCA accumulation—build strategies, backtest, validate, and emit agent-consumable decisions.
site_url: https://hypertrial.github.io/stacksats/
repo_url: https://github.com/hypertrial/stacksats
repo_name: hypertrial/stacksats
edit_uri: edit/main/docs/

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
          options:
            show_source: false
            show_root_heading: true
            show_signature_annotations: true
            merge_init_into_class: true

theme:
  name: material
  logo: assets/stacking-sats-logo.svg
  language: en
  font:
    text: IBM Plex Sans
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - content.action.edit
    - content.action.view
    - search.suggest
    - search.highlight
    - toc.follow

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hypertrial/stacksats
      name: GitHub Repository
    - icon: fontawesome/solid/globe
      link: https://www.stackingsats.org
      name: Stackingsats.org

extra_css:
  - stylesheets/extra.css

not_in_nav: |
  /reference/models/*.md
  !/reference/models/index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Start:
      - Welcome: index.md
      - What's New: whats-new.md
      - Quickstart: start/quickstart.md
      - System Overview: start/system-overview.md
      - Full Data Setup: start/full-data-setup.md
      - EDA Quickstart: start/eda-quickstart.md
      - First Strategy Run: start/first-strategy-run.md
      - Minimal Strategy Examples: start/minimal-strategy-examples.md
      - Notebook Demo: start/notebook-demo.md
      - BRK Data Source: data-source.md
      - FAQ: faq.md
      - Troubleshooting: troubleshooting.md
  - Run:
      - Task Hub: tasks.md
      - Command Index: commands.md
      - Demo Command: run/demo.md
      - Data Command: run/data.md
      - Validate Command: run/validate.md
      - Backtest Command: run/backtest.md
      - Export Command: run/export.md
      - Compare Command: run/compare.md
      - Decide Daily Command: run/decide-daily.md
      - Agent API Service: run/agent-api.md
      - Run Daily Command: run/run-daily.md
      - Animate Command: run/animate.md
  - Build:
      - Framework Boundary: framework.md
      - Model Overview: model.md
      - Signals and Features: concepts/model-signals-features.md
      - Model Development Helpers: concepts/model-development-helpers.md
      - Allocation Kernel: concepts/allocation-kernel.md
      - Backtest Runtime: model_backtest.md
      - Create a Strategy: recipes/create-strategy.md
      - Strict Validation: recipes/strict-validation.md
      - Interpret Backtest Metrics: recipes/interpret-backtest.md
      - Animate Backtest Performance: recipes/animate-backtest.md
      - Migration Guide: migration.md
  - Reference:
      - Public API: reference/public-api.md
      - Stability Policy: stability.md
      - Glossary: glossary.md
      - Merged Metrics Data Guide: reference/merged-metrics-data-guide.md
      - Merged Metrics Schema: reference/merged-metrics-parquet-schema.md
      - Merged Metrics Taxonomy: reference/merged-metrics-taxonomy.md
      - Runtime Objects Overview: objects.md
      - Strategy Object: reference/strategy-object.md
      - Strategies: reference/strategies.md
      - Model Cards: reference/models/index.md
      - FeatureTimeSeries: reference/feature-timeseries.md
      - WeightTimeSeries: reference/strategy-timeseries.md
      - WeightTimeSeries Schema: reference/strategy-timeseries-schema.md
      - API Reference:
          - API Index: reference/api/index.md
          - eda: reference/api/eda.md
          - strategy_types: reference/api/strategy-types.md
          - runner: reference/api/runner.md
          - api module: reference/api/api-module.md
      - Validation Checklist: validation_checklist.md
  - Maintainers:

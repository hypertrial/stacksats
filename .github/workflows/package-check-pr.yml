name: package-check-pr

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs-*.yml"
      - ".github/workflows/docs-*.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: package-check-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start quality timer
        run: echo "QUALITY_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Set up Python project
        uses: ./.github/actions/setup-python-project
        with:
          python-version: "3.11"
          extras: ".[dev]"

      - name: Run lint
        run: ruff check .

      - name: Check docs references
        run: bash scripts/check_docs_refs.sh

      - name: Check docs schema sync
        run: python scripts/sync_objects_schema_docs.py --check

      - name: Capture quality duration
        run: |
          end=$(date +%s)
          elapsed=$((end-QUALITY_START))
          echo "Quality checks runtime: ${elapsed}s"
          echo "$elapsed" > quality_duration.txt

      - name: Upload quality duration
        uses: actions/upload-artifact@v4
        with:
          name: quality-duration
          path: quality_duration.txt
          if-no-files-found: error

  tests:
    name: tests-${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: py311-fast
            python_version: "3.11"
            test_target: tests/unit tests/bdd/scenarios
            marker: "not slow and not integration and not performance"
            extras: ".[dev,deploy]"
          - name: py312-smoke
            python_version: "3.12"
            test_target: tests/unit tests/bdd/scenarios
            marker: "not slow and not integration and not performance"
            extras: ".[dev,deploy]"

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Start tests timer
        run: echo "TESTS_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Set up Python project
        uses: ./.github/actions/setup-python-project
        with:
          python-version: ${{ matrix.python_version }}
          extras: "${{ matrix.extras }}"

      - name: Run tests
        run: pytest ${{ matrix.test_target }} -v -m "${{ matrix.marker }}" \
          --durations=25 --durations-min=1.0 --dist=loadscope

      - name: Capture tests duration
        run: |
          end=$(date +%s)
          elapsed=$((end-TESTS_START))
          echo "Tests runtime (${{ matrix.name }}): ${elapsed}s"
          echo "$elapsed" > "test_duration_${{ matrix.name }}.txt"

      - name: Upload test duration
        uses: actions/upload-artifact@v4
        with:
          name: test-duration-${{ matrix.name }}
          path: test_duration_${{ matrix.name }}.txt
          if-no-files-found: error

  timing-budget:
    runs-on: ubuntu-latest
    needs:
      - quality
      - tests
    steps:
      - name: Download runtime duration artifacts
        uses: actions/download-artifact@v4
        with:
          path: timing
          pattern: "*duration*"
          merge-multiple: true

      - name: Enforce PR runtime budget
        run: |
          shopt -s nullglob
          files=(timing/*duration*.txt)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No runtime duration artifacts were found." >&2
            exit 1
          fi
          quality=0
          max_test=0
          for f in "${files[@]}"; do
            value=$(cat "$f")
            echo "$(basename "$f"): ${value}s"
            base=$(basename "$f")
            if [ "$base" = "quality_duration.txt" ]; then
              quality=$value
            elif [[ "$base" == test_duration_* ]]; then
              if [ "$value" -gt "$max_test" ]; then
                max_test=$value
              fi
            fi
          done
          total=$((quality + max_test))
          echo "Estimated required fast-tier wait (quality + slowest test shard): ${total}s"
          if [ "$total" -gt 480 ]; then
            echo "PR runtime budget exceeded: ${total}s > 480s" >&2
            exit 1
          fi

  package:
    runs-on: ubuntu-latest
    needs:
      - quality
      - tests
      - timing-budget
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine setuptools-scm

      - name: Build package
        run: python -m build

      - name: Validate package metadata
        run: twine check dist/*

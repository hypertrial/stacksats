name: docs-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python project
        uses: ./.github/actions/setup-python-project
        with:
          python-version: "3.11"
          extras: ".[dev,all]"
          constraints-file: "requirements/constraints-maintainer.txt"

      - name: Build docs
        run: python -m mkdocs build --strict

      - name: Stamp deployed docs freshness marker
        run: |
          python scripts/stamp_docs_pages_marker.py \
            --html-path site/index.html \
            --commit "${GITHUB_SHA}" \
            --built-at "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  canary:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify deployed docs freshness
        run: |
          python scripts/check_docs_pages_canary.py \
            --expected-commit "${GITHUB_SHA}" \
            --timeout-seconds 180 \
            --poll-interval-seconds 5

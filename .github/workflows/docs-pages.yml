name: docs-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python project
        uses: ./.github/actions/setup-python-project
        with:
          python-version: "3.11"
          extras: ".[dev,all]"
          constraints-file: "requirements/constraints-maintainer.txt"

      - name: Build docs
        run: python -m mkdocs build --strict

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Package GitHub Pages artifact
        run: |
          if find site -type l -print -quit | grep -q .; then
            echo "GitHub Pages artifact must not contain symbolic links."
            exit 1
          fi
          tar --directory site -cf "$RUNNER_TEMP/github-pages.tar" .
          gzip -f "$RUNNER_TEMP/github-pages.tar"

      - name: Upload packaged GitHub Pages artifact
        uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: ${{ runner.temp }}/github-pages.tar.gz
          if-no-files-found: error

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: package-check

on:
  push:
    branches:
      - main
    paths-ignore:
      # Do not ignore docs/** — tests (e.g. tests/unit/core/test_agent_service_docs.py) assert on docs content.
      - "mkdocs.yml"
      - ".github/workflows/docs-*.yml"
      - ".github/workflows/docs-*.yaml"
  workflow_dispatch:
  schedule:
    - cron: "20 2 * * *"

permissions:
  contents: read

concurrency:
  group: package-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python project
        uses: ./.github/actions/setup-python-project
        with:
          python-version: "3.11"
          extras: ".[dev,all]"
          constraints-file: "requirements/constraints-maintainer.txt"

      - name: Run lint
        run: ruff check .

      - name: Guard against legacy metric-source refs
        run: python scripts/check_no_coinmetrics_refs.py

      - name: Check docs references
        run: bash scripts/check_docs_refs.sh

      - name: Check docs schema sync
        run: python scripts/sync_objects_schema_docs.py --check

  tests:
    name: tests-${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: py311-nonperf
            python_version: "3.11"
            test_target: tests/
            marker: "not performance"
            extras: ".[dev,all]"
          - name: py312-smoke
            python_version: "3.12"
            test_target: tests/unit tests/bdd/scenarios
            marker: "not slow and not integration and not performance"
            extras: ".[dev,all]"

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python project
        uses: ./.github/actions/setup-python-project
        with:
          python-version: ${{ matrix.python_version }}
          extras: "${{ matrix.extras }}"
          constraints-file: "requirements/constraints-maintainer.txt"

      - name: Run tests
        run: |
          pytest ${{ matrix.test_target }} -v -m "${{ matrix.marker }}" \
            --durations=25 --durations-min=1.0 --dist=loadscope

  docs_strict:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python project
        uses: ./.github/actions/setup-python-project
        with:
          python-version: "3.11"
          extras: ".[dev,all]"
          constraints-file: "requirements/constraints-maintainer.txt"

      - name: Build docs (strict)
        run: python -m mkdocs build --strict

  package:
    runs-on: ubuntu-latest
    needs:
      - quality
      - tests
      - docs_strict
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          pip install -c requirements/constraints-maintainer.txt build twine setuptools-scm

      - name: Build package
        run: python -m build

      - name: Validate package metadata
        run: twine check dist/*

      - name: Upload built distributions
        uses: actions/upload-artifact@v6
        with:
          name: package-check-dist
          path: dist/*
          if-no-files-found: error

  service_wheel_smoke:
    runs-on: ubuntu-latest
    needs:
      - package
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/constraints-maintainer.txt

      - name: Download built distributions
        uses: actions/download-artifact@v8
        with:
          name: package-check-dist
          path: dist

      - name: Run installed-wheel hosted service smoke
        run: |
          python scripts/release_wheel_smoke.py \
            --wheel dist/*.whl \
            --constraints-file requirements/constraints-maintainer.txt \
            --mode service

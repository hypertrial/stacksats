name: release-gate

on:
  push:
    branches:
      - "release/**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python project
        uses: ./.github/actions/setup-python-project
        with:
          python-version: "3.11"
          extras: ".[dev,all]"
          constraints-file: "requirements/constraints-maintainer.txt"

      - name: Run lint
        run: ruff check .

      - name: Guard source contracts
        run: |
          python scripts/check_no_coinmetrics_refs.py
          python scripts/check_polars_only_refs.py
          python scripts/check_polars_hotpath_refs.py

      - name: Check docs references and generated docs sync
        run: |
          bash scripts/check_docs_refs.sh
          python scripts/check_release_docs_sync.py
          python scripts/sync_objects_schema_docs.py --check
          python scripts/generate_merged_metrics_taxonomy.py --check

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python project
        uses: ./.github/actions/setup-python-project
        with:
          python-version: "3.11"
          extras: ".[dev,all]"
          constraints-file: "requirements/constraints-maintainer.txt"

      - name: Build docs (strict)
        run: python -m mkdocs build --strict

  tests_py311:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python project
        uses: ./.github/actions/setup-python-project
        with:
          python-version: "3.11"
          extras: ".[dev,all]"
          constraints-file: "requirements/constraints-maintainer.txt"

      - name: Run full non-performance test suite
        run: pytest tests/ -v -m "not performance" --durations=25 --durations-min=1.0 --dist=loadscope

  tests_py312:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python project
        uses: ./.github/actions/setup-python-project
        with:
          python-version: "3.12"
          extras: ".[dev,all]"
          constraints-file: "requirements/constraints-maintainer.txt"

      - name: Run smoke test tier
        run: pytest tests/unit tests/bdd/scenarios -v -m "not slow and not integration and not performance" --durations=25 --durations-min=1.0 --dist=loadscope

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python project
        uses: ./.github/actions/setup-python-project
        with:
          python-version: "3.11"
          extras: ".[dev,all]"
          constraints-file: "requirements/constraints-maintainer.txt"

      - name: Run branch-aware coverage gate
        run: bash scripts/check_coverage.sh

  package:
    runs-on: ubuntu-latest
    needs:
      - quality
      - docs
      - tests_py311
      - tests_py312
      - coverage
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/constraints-maintainer.txt

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          pip install -c requirements/constraints-maintainer.txt build twine setuptools-scm

      - name: Build package
        run: python -m build

      - name: Validate package metadata
        run: twine check dist/*

      - name: Upload built distributions
        uses: actions/upload-artifact@v6
        with:
          name: release-dist
          path: dist/*
          if-no-files-found: error

  wheel_smoke:
    runs-on: ubuntu-latest
    needs:
      - package
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/constraints-maintainer.txt

      - name: Download built distributions
        uses: actions/download-artifact@v8
        with:
          name: release-dist
          path: dist

      - name: Run isolated wheel smoke tests
        run: |
          python scripts/release_wheel_smoke.py \
            --wheel dist/*.whl \
            --constraints-file requirements/constraints-maintainer.txt \
            --mode all

  macos_smoke:
    runs-on: macos-latest
    needs:
      - package
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/constraints-maintainer.txt

      - name: Download built distributions
        uses: actions/download-artifact@v8
        with:
          name: release-dist
          path: dist

      - name: Run macOS base smoke
        run: |
          python scripts/release_wheel_smoke.py \
            --wheel dist/*.whl \
            --constraints-file requirements/constraints-maintainer.txt \
            --mode base

name: docs-check

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python project
        uses: ./.github/actions/setup-python-project
        with:
          python-version: "3.11"
          extras: ".[dev]"

      - name: Collect tracked markdown files
        run: |
          bash scripts/check_markdown_scope.sh > .markdown_files.txt
          echo "MARKDOWN_FILES=$(tr '\n' ' ' < .markdown_files.txt)" >> "$GITHUB_ENV"

      - name: Lint markdown
        run: xargs pymarkdown -d MD003,MD007,MD013,MD022,MD024,MD026,MD029,MD030,MD032,MD033,MD041 scan < .markdown_files.txt

      - name: Check spelling
        run: xargs codespell --config .codespellrc < .markdown_files.txt

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose --no-progress --max-retries 2 --retry-wait-time 2
            --accept 200,429 --exclude-mail
            ${{ env.MARKDOWN_FILES }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check docs references
        run: bash scripts/check_docs_refs.sh

      - name: Check release docs sync
        run: python scripts/check_release_docs_sync.py

      - name: Check docs UX structure
        run: python scripts/check_docs_ux.py

      - name: Build docs (strict)
        run: python -m mkdocs build --strict

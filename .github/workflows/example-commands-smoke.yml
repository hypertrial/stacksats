name: example-commands-smoke

on:
  schedule:
    - cron: "10 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: example-commands-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python project
        uses: ./.github/actions/setup-python-project
        with:
          python-version: "3.11"
          extras: ".[dev,deploy]"

      - name: Install build backend
        run: python -m pip install build

      - name: Build wheel
        run: python -m build --wheel

      - name: Smoke packaged first run
        run: |
          python -m venv /tmp/stacksats-wheel-smoke
          /tmp/stacksats-wheel-smoke/bin/pip install dist/*.whl
          /tmp/stacksats-wheel-smoke/bin/stacksats demo backtest --output-dir /tmp/stacksats-wheel-output
          test -n "$(find /tmp/stacksats-wheel-output -name backtest_result.json -print -quit)"

      - name: Run docs example command smoke checks
        run: python scripts/test_example_commands.py

name: setup-python-project
description: Set up Python with pip cache and install editable project extras.

inputs:
  python-version:
    description: Python version to set up.
    required: true
  extras:
    description: Extras spec passed to pip install -e.
    required: false
    default: ".[dev]"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: pyproject.toml

    - name: Install project dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -e "${{ inputs.extras }}"

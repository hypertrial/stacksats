name: setup-python-project
description: Set up Python with pip cache and install editable project extras.

inputs:
  python-version:
    description: Python version to set up.
    required: true
  extras:
    description: Extras spec passed to pip install -e.
    required: false
    default: ".[dev]"
  constraints-file:
    description: Optional constraints file passed to pip install with -c.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: pyproject.toml

    - name: Install project dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [ -n "${{ inputs.constraints-file }}" ]; then
          pip install -c "${{ inputs.constraints-file }}" -e "${{ inputs.extras }}"
        else
          pip install -e "${{ inputs.extras }}"
        fi

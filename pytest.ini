[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short -n auto -m "not slow and not performance and not integration"
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests requiring real external calls
    performance: marks tests as performance benchmarks (deselect with '-m "not performance"')
filterwarnings =
    ignore:Benchmarks are automatically disabled because xdist plugin is active.*:pytest_benchmark.logger.PytestBenchmarkWarning

# pytest-bdd configuration
bdd_features_base_dir = tests/bdd/features
